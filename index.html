<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe · Rust + WebAssembly</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --line: #2b303b;
      --x: #58a6ff;
      --o: #ff7b72;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      background: radial-gradient(1200px 600px at 50% -10%, #1b2130, var(--bg));
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 2rem 1rem;
    }
    h1 { font-size: 1.5rem; margin: 0; letter-spacing: 0.5px; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: -0.5rem; }
    #status {
      font-size: 1.05rem;
      min-height: 1.5rem;
      font-weight: 600;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 92px);
      grid-template-rows: repeat(3, 92px);
      gap: 8px;
      background: var(--line);
      padding: 8px;
      border-radius: 14px;
    }
    .cell {
      background: var(--panel);
      border: none;
      border-radius: 8px;
      font-size: 2.75rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease, transform 0.05s ease;
    }
    .cell:hover:not(:disabled) { background: #20242e; }
    .cell:active:not(:disabled) { transform: scale(0.96); }
    .cell:disabled { cursor: default; }
    .cell.x { color: var(--x); }
    .cell.o { color: var(--o); }
    button.reset {
      background: var(--x);
      color: #06131f;
      border: none;
      padding: 0.6rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
    }
    button.reset:hover { filter: brightness(1.08); }
    .foot { color: var(--muted); font-size: 0.75rem; }
    .foot a { color: var(--x); text-decoration: none; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div class="sub">You are <b style="color:var(--x)">X</b> · the Rust AI is <b style="color:var(--o)">O</b></div>
  <div id="status">Loading…</div>
  <div id="board"></div>
  <button class="reset" id="reset">New game</button>
  <div class="foot">Game logic &amp; AI compiled to WebAssembly with 🦀 Rust</div>

  <script type="module">
    import init, { Game } from './pkg/tic_tac_toe.js';

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const cells = [];
    let game;

    async function run() {
      await init();              // load the .wasm module
      game = new Game();

      for (let i = 0; i < 9; i++) {
        const btn = document.createElement('button');
        btn.className = 'cell';
        btn.addEventListener('click', () => onCellClick(i));
        boardEl.appendChild(btn);
        cells.push(btn);
      }
      resetBtn.addEventListener('click', () => { game.reset(); render(); });
      render();
    }

    function onCellClick(i) {
      if (game.human_move(i)) render();
    }

    function render() {
      const symbols = ['', 'X', 'O'];
      for (let i = 0; i < 9; i++) {
        const v = game.cell(i);
        cells[i].textContent = symbols[v];
        cells[i].className = 'cell' + (v === 1 ? ' x' : v === 2 ? ' o' : '');
        cells[i].disabled = v !== 0;
      }
      const status = game.status();
      if (status === 'x') { statusEl.textContent = '🎉 You win!'; disableAll(); }
      else if (status === 'o') { statusEl.textContent = '🤖 Computer wins!'; disableAll(); }
      else if (status === 'draw') { statusEl.textContent = '🤝 It\'s a draw!'; disableAll(); }
      else { statusEl.textContent = 'Your turn'; }
    }

    function disableAll() {
      cells.forEach(c => (c.disabled = true));
    }

    run().catch(err => {
      statusEl.textContent = 'Failed to load. See console.';
      console.error(err);
    });
  </script>
</body>
</html>
